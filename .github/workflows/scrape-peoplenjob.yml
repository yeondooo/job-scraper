name: Scrape PeopleNJob

on:
  schedule:
    - cron: '0 10 * * *'  # 매일 19:00 KST (10:00 UTC)
  workflow_dispatch:      # 수동 실행 및 입력 지원
    inputs:
      max_pages:
        description: '수집할 최대 페이지 수 (기본 50페이지)'
        required: true
        default: '50'

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: peoplenjob.com

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml supabase python-dotenv

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.JASOSEOL_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.JASOSEOL_SUPABASE_KEY }}
        run: python scraper.py --max-pages ${{ github.event.inputs.max_pages || '10' }}
