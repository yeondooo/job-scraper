name: Scrape Kowork

on:
  schedule:
    - cron: '0 11 * * *'  # 매일 20:00 KST (11:00 UTC)
  workflow_dispatch:      # 수동 실행 및 입력 지원
    inputs:
      limit:
        description: '수집할 최대 공고 개수 (기본 100개)'
        required: true
        default: '100'
      use_sitemap:
        description: '사이트맵 모드 사용 (true/false, 기본 true)'
        required: true
        default: 'true'

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kowork.kr

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml supabase python-dotenv

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.JASOSEOL_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.JASOSEOL_SUPABASE_KEY }}
        run: |
          if [ "${{ github.event.inputs.use_sitemap || 'true' }}" = "true" ]; then
            python scraper.py --sitemap --limit ${{ github.event.inputs.limit || '100' }}
          else
            python scraper.py --limit ${{ github.event.inputs.limit || '15' }}
          fi
