name: Scrape LinkedIn

on:
  schedule:
    - cron: '0 13 * * *'  # 매일 22:00 KST (13:00 UTC)
  workflow_dispatch:      # 수동 실행 및 입력 지원
    inputs:
      keyword:
        description: '검색 키워드 (기본: 전체 직업군 수집시 비워둠)'
        required: false
        default: ''
      location:
        description: '지역 (기본: Singapore)'
        required: true
        default: 'Singapore'
      max_pages:
        description: '수집할 최대 페이지 수 (기본 4페이지, 페이지당 25건)'
        required: true
        default: '4'

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: linkedin.com

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.JASOSEOL_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.JASOSEOL_SUPABASE_KEY }}
        run: |
          python scraper.py \
            --keyword "${{ github.event.inputs.keyword }}" \
            --location "${{ github.event.inputs.location || 'Singapore' }}" \
            --max-pages ${{ github.event.inputs.max_pages || '4' }} \
            --delay 3.0
